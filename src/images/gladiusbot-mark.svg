<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="GladiusBOT">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c3a1c"/>
      <stop offset="55%" stop-color="#3d2814"/>
      <stop offset="100%" stop-color="#2a1a0e"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a4e26" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a1008" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#876e3e"/>
      <stop offset="35%" stop-color="#ffcc66"/>
      <stop offset="65%" stop-color="#d4a742"/>
      <stop offset="100%" stop-color="#876e3e"/>
    </linearGradient>
    <linearGradient id="letters" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8cf"/>
      <stop offset="40%" stop-color="#ffcc66"/>
      <stop offset="100%" stop-color="#ba9700"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#2a1a0e" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#ffcc66" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="22" fill="url(#bg)"/>
  <rect x="10" y="10" width="108" height="108" rx="18" fill="url(#inner)"/>
  <rect x="4.5" y="4.5" width="119" height="119" rx="21.5" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
  <rect x="8" y="8" width="112" height="112" rx="20" fill="none" stroke="#c9a66b" stroke-width="1" opacity="0.35"/>
  <path d="M18 34 Q64 22 110 34" fill="none" stroke="url(#ring)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <g filter="url(#glow)">
    <text x="64" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" letter-spacing="-2" fill="url(#letters)">GB</text>
  </g>

  <circle cx="98" cy="30" r="5" fill="#ffcc66" opacity="0.95"/>
  <circle cx="98" cy="30" r="2.2" fill="#fff8cf"/>
</svg>
